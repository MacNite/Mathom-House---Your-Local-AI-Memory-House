name: docker-build

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # The builder image is pulled from Docker Hub. Retry bootstrapping it to
      # tolerate transient registry timeouts on GitHub-hosted runners.
      - name: Set up Docker Buildx
        id: buildx
        continue-on-error: true
        uses: docker/setup-buildx-action@v3
        with:
          name: mathom-builder

      - name: Retry Docker Buildx bootstrap
        if: steps.buildx.outcome == 'failure'
        shell: bash
        run: |
          set -uo pipefail
          docker buildx rm mathom-builder >/dev/null 2>&1 || true
          for attempt in 1 2 3; do
            if docker buildx create --name mathom-builder --driver docker-container --use \
              && docker buildx inspect mathom-builder --bootstrap; then
              exit 0
            fi
            docker buildx rm mathom-builder >/dev/null 2>&1 || true
            if [ "$attempt" -eq 3 ]; then
              exit 1
            fi
            sleep $((attempt * 10))
          done

      - name: Log in to GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/mathom
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=long,enable={{is_default_branch}}

      - name: Build mathom image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: ${{ github.event_name == 'push' }}
          tags: ${{ github.event_name == 'push' && steps.meta.outputs.tags || 'mathom:ci' }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=mathom
          cache-to: type=gha,scope=mathom,mode=max
